<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="https://www.youtube.com/game_api/v1"></script>
    <script>
  // Game ke dauran aane wale kisi bhi error ko real-time screen par dekhne ke liye
  window.onerror = function(message, source, lineno, colno, error) {
    var errorDiv = document.getElementById('runtime-error-popup');
    if(!errorDiv) {
      errorDiv = document.createElement('div');
      errorDiv.id = 'runtime-error-popup';
      errorDiv.style.position = 'fixed'; errorDiv.style.bottom = '10px'; errorDiv.style.left = '10px';
      errorDiv.style.width = '90%'; errorDiv.style.background = 'rgba(255,0,0,0.95)';
      errorDiv.style.color = 'white'; errorDiv.style.zIndex = '999999'; errorDiv.style.padding = '15px';
      errorDiv.style.fontSize = '14px'; errorDiv.style.borderRadius = '8px';
      document.body.appendChild(errorDiv);
    }
    errorDiv.innerHTML = '<strong>Game Crashed:</strong> ' + message + '<br>Line: ' + lineno;
    return false;
  };
</script>

    
    <title>shoot bubbles</title>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" defer src="/src/main.tsx"></script>
    <script>eruda.init();</script>
  </body>
</html>
